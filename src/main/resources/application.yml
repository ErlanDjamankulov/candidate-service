spring:
  application:
    name: candidate-service

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5433}/${DB_NAME:candidate_service}
    username: ${DB_USER:candidate_service}
    password: ${DB_PASSWORD:candidate_service}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: false
        jdbc:
          time_zone: UTC

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: candidate-service
      auto-offset-reset: earliest
    listener:
      ack-mode: record

app:
  kafka:
    topics:
      cv-parsed: cv.parsed
      candidate-status-changed: candidate.status.changed

springdoc:
  swagger-ui:
    path: /swagger-ui.html

server:
  port: 8080

logging:
  level:
    kg.tunduk.cvscan.candidate: INFO